name: hocaefendi_ai_app
description: "HocaefendiAI Flutter uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.3
  google_sign_in: ^6.2.1
  record: ^6.2.0
  audioplayers: ^6.0.0
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.1
  animated_switcher_plus: ^1.4.0
  flutter_riverpod: ^2.5.1
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.2 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/emotions/huzur/
    - assets/emotions/huzun/
    - assets/emotions/cosku/
    - assets/emotions/sefkat/
    - assets/emotions/tefekkur/